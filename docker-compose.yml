services:
  superstore-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superstore-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/mlartifacts/1/models/m-f612a2259fc642ceb2d7071cb9334223/artifacts/model.pkl
      - MODEL_NAME=superstore_GradientBoosting
      - MODEL_STAGE=Production
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
